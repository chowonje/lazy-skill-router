name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-platform:
    name: verify (${{ matrix.os }}, Python ${{ matrix.python }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            python: "3.9"
          - os: ubuntu-24.04
            python: "3.11"
          - os: ubuntu-24.04
            python: "3.14"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python }}

      - name: Install dev tools
        run: python -m pip install build pipx ruff twine

      - name: Lint and format check
        run: |
          ruff check .
          ruff format --check .

      - name: Run tests
        run: python3 -m unittest discover -s tests -p "test*.py"

      - name: Compile Python files
        run: >
          python3 -m py_compile
          lazy_skill_router.py
          lazy_skill_router_contracts.py
          lazy_skill_router_core.py
          lazy_skill_router_common.py
          lazy_skill_router_install_manifest.py
          lazy_skill_router_inventory.py
          lazy_skill_router_logging.py
          lazy_skill_router_scoring.py
          measurement.py
          generate_routes.py
          install.py
          doctor.py
          uninstall.py
          validate_routes.py
          release_checksums.py
          sync_skills.py
          eval_routes.py
          lazy_skill_router_cli/cli.py
          tests/test_cli.py
          tests/test_config_trust.py
          tests/test_eval_routes.py
          tests/test_fail_open_matrix.py
          tests/test_generate_routes.py
          tests/test_hook_contract.py
          tests/test_install.py
          tests/test_install_manifest.py
          tests/test_install_transaction.py
          tests/test_inventory.py
          tests/test_lazy_skill_router.py
          tests/test_logging.py
          tests/test_measurement.py
          tests/test_route_result_v2.py
          tests/test_schema_v2.py
          tests/test_surface_equivalence.py

      - name: Validate route config and golden prompts
        run: |
          python3 -m json.tool routes.default.json >/dev/null
          python3 -m json.tool routes.template.json >/dev/null
          python3 validate_routes.py routes.default.json
          python3 eval_routes.py eval/prompts.jsonl

      - name: Build skill sync fixture
        run: |
          python3 - <<'PY'
          import json
          import re
          from pathlib import Path

          config = json.loads(Path("routes.default.json").read_text(encoding="utf-8"))
          skills = set(config.get("allowedSkills", []))
          default_verification = config.get("defaultVerification")
          if isinstance(default_verification, str) and default_verification:
              skills.add(default_verification)

          for route in config.get("routes", []):
              if not isinstance(route, dict):
                  continue
              for key in ("primary", "verification"):
                  value = route.get(key)
                  if isinstance(value, str) and value:
                      skills.add(value)
              supporting = route.get("supporting", [])
              if isinstance(supporting, str):
                  skills.add(supporting)
              elif isinstance(supporting, list):
                  skills.update(item for item in supporting if isinstance(item, str) and item)

          root = Path(".ci/codex/skills")
          for index, skill in enumerate(sorted(skills)):
              safe_name = re.sub(r"[^A-Za-z0-9_.-]+", "_", skill) or f"skill_{index}"
              skill_dir = root / safe_name
              skill_dir.mkdir(parents=True, exist_ok=True)
              (skill_dir / "SKILL.md").write_text(f"---\nname: {skill}\n---\n# {skill}\n", encoding="utf-8")

          Path(".ci/agents").mkdir(parents=True, exist_ok=True)
          PY

      - name: Generate route config from template
        run: |
          python3 generate_routes.py \
            --codex-home .ci/codex \
            --agents-home .ci/agents \
            --template routes.template.json \
            --output .ci/generated-routes.json
          python3 validate_routes.py .ci/generated-routes.json

      - name: Check route skill sync
        run: >
          python3 sync_skills.py
          --codex-home .ci/codex
          --agents-home .ci/agents
          --routes .ci/generated-routes.json
          --manifest-output .ci/skills.manifest.json
          --strict

      - name: Check versioned routing contracts
        run: |
          python3 lazy_skill_router.py \
            --config .ci/generated-routes.json \
            --route-result-v2 \
            "GitHub PR에서 CI 실패 고쳐줘" > .ci/route-result-v2.json
          python3 lazy_skill_router.py \
            --config .ci/generated-routes.json \
            --inventory .ci/skills.manifest.json \
            --recommendation-json \
            "GitHub PR에서 CI 실패 고쳐줘" > .ci/recommendation-v1.json
          python3 lazy_skill_router.py \
            --config .ci/generated-routes.json \
            --inventory .ci/skills.manifest.json \
            --hook-ir-json \
            "GitHub PR에서 CI 실패 고쳐줘" > .ci/hook-ir-v1.json
          python3 - <<'PY'
          import json
          from pathlib import Path

          route_result = json.loads(Path(".ci/route-result-v2.json").read_text(encoding="utf-8"))
          recommendation = json.loads(Path(".ci/recommendation-v1.json").read_text(encoding="utf-8"))
          hook_ir = json.loads(Path(".ci/hook-ir-v1.json").read_text(encoding="utf-8"))
          assert route_result["contract"] == "lazy-skill-router.route-result/v2"
          assert recommendation["contract"]["name"] == "lazy-skill-router.skill-recommendation"
          assert recommendation["producer"]["inventory_state"] == "available"
          assert recommendation["semantics"]["authority"] == "none"
          assert hook_ir["schema"] == "lazy-skill-router.hook-ir/v1"
          PY

      - name: Check installer and doctor smoke
        run: |
          python3 install.py \
            --codex-home .ci/install-codex \
            --agents-home .ci/install-agents \
            --dry-run
          python3 install.py \
            --codex-home .ci/install-codex \
            --agents-home .ci/install-agents \
            --enable-measurement \
            --activation-mode shadow
          python3 doctor.py \
            --codex-home .ci/install-codex \
            --agents-home .ci/install-agents

      - name: Check wheel and pipx CLI smoke
        run: |
          python -m build
          python -m twine check dist/*
          pipx_home="$(mktemp -d)"
          pipx_bin="$(mktemp -d)"
          PIPX_HOME="$pipx_home" PIPX_BIN_DIR="$pipx_bin" python -m pipx install dist/*.whl
          expected_version="$(awk -F'"' '/^version = / {print $2; exit}' pyproject.toml)"
          test "$("$pipx_bin/lazy-skill-router" --version)" = "lazy-skill-router $expected_version"
          "$pipx_bin/lazy-skill-router" route "GitHub PR에서 CI 실패 고쳐줘"
          "$pipx_bin/lazy-skill-router" route --route-result-v2 "GitHub PR에서 CI 실패 고쳐줘"
          "$pipx_bin/lazy-skill-router" route --recommendation-json "GitHub PR에서 CI 실패 고쳐줘"
          "$pipx_bin/lazy-skill-router" route --hook-ir-json "GitHub PR에서 CI 실패 고쳐줘"
          measurement_log="$(mktemp)"
          "$pipx_bin/lazy-skill-router" outcome \
            --config routes.default.json --log "$measurement_log" --case-id ci-smoke --replicate 1 \
            --arm native --status fail --source objective
          "$pipx_bin/lazy-skill-router" outcome \
            --config routes.default.json --log "$measurement_log" --case-id ci-smoke --replicate 1 \
            --arm inject --status pass --source objective
          "$pipx_bin/lazy-skill-router" report --log "$measurement_log" --json > .ci/measurement-report.json
          python3 - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path(".ci/measurement-report.json").read_text(encoding="utf-8"))
          assert report["pairedNativeInject"]["pairs"] == 1
          assert report["pairedNativeInject"]["rescues"] == 1
          assert report["comparability"]["outcomeAggregateComparable"] is True
          assert report["warnings"] == []
          PY
          tmp="$(mktemp -d)"
          "$pipx_bin/lazy-skill-router" install \
            --codex-home "$tmp/codex" \
            --agents-home "$tmp/agents" \
            --dry-run
          "$pipx_bin/lazy-skill-router" install \
            --codex-home "$tmp/codex" \
            --agents-home "$tmp/agents" \
            --enable-measurement \
            --activation-mode shadow
          "$pipx_bin/lazy-skill-router" doctor \
            --codex-home "$tmp/codex" \
            --agents-home "$tmp/agents"
          "$pipx_bin/lazy-skill-router" uninstall \
            --codex-home "$tmp/codex"

      - name: Check fail-open CLI behavior
        run: |
          output="$(
            PYTHONDONTWRITEBYTECODE=1 LAZY_SKILL_ROUTER_DEBUG=1 \
              python3 lazy_skill_router.py --dry-run --config /dev/stdin --prompt "PDF 만들어줘" <<'JSON'
          {"routes":[{"name":"bad","primary":"pdf","patterns":["["]}]}
          JSON
          )"
          printf '%s\n' "$output"
          printf '%s\n' "$output" | python3 -c 'import json, sys; assert json.load(sys.stdin)["shouldInject"] is False'

  verify:
    name: verify
    needs: verify-platform
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - name: Confirm Linux compatibility matrix
        run: echo "All required Linux and Python combinations passed."
